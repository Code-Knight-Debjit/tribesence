# ──────────────────────────────────────────────────────────────────
# docker-compose.yml — Tribesence
#
# Usage:
#   Development  →  docker compose up
#   Production   →  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ──────────────────────────────────────────────────────────────────

services:

  web:
    build: .
    image: tribesence:latest
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      # Persist the SQLite database across container restarts
      - sqlite_data:/app/db.sqlite3
    environment:
      - DJANGO_SETTINGS_MODULE=tribesence.settings
      - SECRET_KEY=${SECRET_KEY:-django-insecure-tribesence-dev-key-change-in-production}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  sqlite_data: